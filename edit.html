<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カラダの声診断 — 編集用</title>
<style>
  :root{--ink:#4a3d42;--muted:#7a6a70;--rose:#e6a6b4;--rosegold:#e3b79e;--champ:#c9a85f;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:radial-gradient(130% 95% at 50% -12%,#fff 0%,#fefafa 52%,#fcf6f1 100%) fixed;color:var(--ink);
    line-height:1.7;-webkit-text-size-adjust:100%;}
  .wrap{max-width:720px;margin:0 auto;padding:18px 14px 40px;}
  h1{font-family:"Hiragino Mincho ProN",serif;font-size:1.2rem;color:#b88a32;letter-spacing:.08em;margin:6px 0 2px;text-align:center;font-weight:500;}
  .lead{color:var(--muted);font-size:.82rem;text-align:center;margin:0 0 14px;}
  .note{background:#fff;border:1px solid rgba(190,150,140,.25);border-radius:12px;padding:12px 14px;font-size:.82rem;color:var(--muted);margin-bottom:12px;line-height:1.75;}
  textarea{width:100%;min-height:64vh;border:1.5px solid rgba(190,150,140,.35);border-radius:14px;
    padding:14px;font-size:15px;line-height:1.85;font-family:-apple-system,"Hiragino Sans",sans-serif;
    color:var(--ink);background:#fff;resize:vertical;-webkit-appearance:none;}
  textarea:focus{outline:none;border-color:var(--champ);}
  .bar{position:sticky;bottom:0;display:flex;gap:9px;padding:12px 0 4px;
    background:linear-gradient(180deg,rgba(255,255,255,0),#fcf6f1 40%,#fcf6f1);}
  button{flex:1;border:none;border-radius:13px;padding:16px;font-size:1.05rem;font-weight:700;color:#fff;
    background:linear-gradient(135deg,var(--rose),var(--rosegold));box-shadow:0 8px 18px rgba(220,160,170,.3);
    letter-spacing:.04em;cursor:pointer;font-family:inherit;}
  button.sub{flex:0 0 auto;background:#fff;color:var(--muted);border:1px solid #ddd;box-shadow:none;font-weight:600;font-size:.9rem;padding:16px 14px;}
  .saved{text-align:center;font-size:.8rem;color:var(--champ);min-height:1.3em;margin-top:8px;letter-spacing:.04em;font-weight:700;}
</style></head>
<body><div class="wrap">
  <h1>カラダの声診断 ｜ 編集用</h1>
  <p class="lead">下の文を、自由に書き直してください（v2・最新）</p>
  <div class="note">
    ・直したい所を、そのまま打ち直すだけ。<br>
    ・行アタマの【首】【骨盤】…は「裏のタイプ」。文だけ直すのが基本。<br>
    ・★がついた「わたしが見てきたこと」を、なお さんの言葉に変えると一気に本物に。<br>
    ・打った内容は<strong>自動でこの端末に保存</strong>（消えません）。<br>
    ・直し終わったら<strong>「全部コピー」</strong>を押して、クロードに貼って渡してください。
  </div>
  <textarea id="t" spellcheck="false"></textarea>
  <div class="saved" id="saved"></div>
  <div class="bar">
    <button class="sub" id="reset">最初に戻す</button>
    <button id="copy">全部コピー</button>
  </div>
</div>
<script>
const DEFAULT = "カラダの声診断 ｜ 編集用シート v2（自由に書き換えてOK）\n\n【直し方のルール】\n・各行アタマの【　】＝裏のタイプ。その右の文を自由に書き換え。\n・タイプを変えたいときは【　】の中を 首/背中/腰/骨盤/仙骨/整/気づけてない に。\n・【骨盤＋仙骨】の＋＝メイン＋少しだけ別タイプ。\n・★アプリには「年数・人数・日付」は入れません（あとで直せない＝古くなるため）。\n　26年・1万人などの自己紹介は「投稿」で語る。だから下の文にも数字は入れてません。\n・書き終わったら、丸ごと貼って渡してください。\n\n━━━ 第1部　質問（全12問・各4択）━━━\n\n──── 第1章　思考と心のクセ ────\n\nQ1. つい、やってしまうクセは？\n　【首】あれこれ考えすぎて、なかなか動き出せない\n　【背中】まわりに気をつかい、いい人でいる\n　【腰】こうと決めたら、ゆずれない\n　【骨盤】本音を飲みこんで、笑顔でやり過ごす\n\nQ2. ストレスがかかると、どうなりがち？\n　【首】頭がぐるぐるして、休まらない\n　【背中】人の評価や顔色が、気になってしまう\n　【仙骨】気力がしぼんで、動けなくなる\n　【整】わりと切り替えられる\n\nQ3. 感情について、近いのは？\n　【骨盤】本当の気持ちにフタをして、我慢しがち\n　【仙骨】感情を、あまり感じないようにしている\n　【骨盤＋仙骨】モヤモヤやイライラが、急にあふれる\n　【整】わりと素直に出せている\n\nQ4. 頼ること・甘えることは？\n　【背中】頼るのが苦手で、ひとりで抱えこむ\n　【首】スマホや甘いものに、つい頼ってしまう\n　【仙骨】もう、誰かに任せてしまいたい\n　【整】人に、ちゃんと頼れている\n\n──── 第2章　気になる見た目 ────\n\nQ5. 鏡を見て、いちばん気になるのは？\n　【首】顔のたるみ・くすみ・目元のクマ\n　【骨盤】下半身太り・ぽっこりお腹\n　【背中】肩幅・二の腕・背中の厚み\n　【整】いまは、とくに気にならない\n\nQ6. 体型の変化で気になるのは…\n　【骨盤】くびれが、ゆるくなってきた\n　【腰＋骨盤】脚やお尻が、どっしりしてきた\n　【背中】上半身が、がっしりしてきた\n　【整】とくに変化は感じない\n\nQ7. めぐり（むくみ・冷え）は？\n　【首＋骨盤】顔やまぶたが、むくみやすい\n　【腰＋骨盤】下半身がむくむ・冷える\n　【骨盤＋腰】手足が、いつも冷たい\n　【整】あまり気にならない\n\nQ8. 肌・髪・顔色のツヤは？\n　【骨盤】つや・うるおいが、減ってきた\n　【首】顔色がさえない・くすむ\n　【仙骨】なんとなく、生気がない感じ\n　【整】わりと元気に見える方\n\n──── 第3章　カラダの不調・サイン ────\n\nQ9. 出やすい不調は？\n　【首】肩こり・頭痛・目の疲れ\n　【背中】胃腸の弱さ・自律神経の乱れ\n　【腰】腰痛・ぎっくり腰\n　【整】とくに、不調はない\n\nQ10. 眠りと、朝の感じは？\n　【首】考えごとで、寝つきが悪い\n　【背中】眠りが浅い・ため息が多い\n　【仙骨】朝がいちばんつらい・起きられない\n　【整】わりと、よく眠れている\n\nQ11. 生理・ホルモンの波は？\n　【骨盤】生理前のゆらぎ（PMS・むくみ・気分）\n　【腰＋骨盤】生理痛・下半身の冷えがつらい\n　【仙骨】疲れると、すぐ乱れる\n　【整】わりと安定している方\n\nQ12. 自分のカラダのこと、正直…\n　【気づけてない】よく分からない・見て見ぬふり\n　【気づけてない】不調があるのが、当たり前になっている\n　【気づけてない】気になるけど、何をすればいいか分からない\n　【整】わりと分かっているほう\n\n\n━━━ 第2部　結果文（5タイプ・自由に書き換え）━━━\n※各タイプ「見出し→本文→希望→セルフケア→わたしが見てきたこと」。\n※「わたしが見てきたこと」＝前の「科学のうらづけ」を、なお さんの実感に差し替えた所（数字なし）。\n\n──── 首=考えすぎ ────\n［見出し］\nあなたは、考えすぎが“見た目と不調”に出る人。\n\n［本文］\n(1) 頭がいつも動いていて、ぐるぐる思考が止まりにくいタイプ。気づくと、スマホや甘いものに頼りたくなりませんか？\n(2) その緊張は、肩こり・頭痛・目の疲れになり、さらに——顔のたるみ・くすみ・目元のクマとして“見た目”にあらわれます。\n(3) たるみも目元のクマも、年齢だけのせいではありません。「考えすぎ」のクセが、そのまま出ているサインです。\n\n［希望］\n思考の緊張がゆるむと、顔まわりが引き上がり、目元も軽くなります。頭で頑張ってきた人ほど、ここが解けると見た目が変わります。\n\n［セルフケア］\n考えすぎに気づいたら、いったん目を閉じて、口から長〜く息を吐いてみて。それだけで、首と頭の力がふっとゆるみます。\n\n［わたしが見てきたこと］← ★ここを、なお さんの言葉で\nたくさんのカラダに触れてきて、いつも感じます。考えすぎる人ほど、首がカチカチ。そして、顔も上がりにくい。\n\n──── 背中=気づかい ────\n［見出し］\nあなたは、気づかいを“カラダ”に溜めこむ人。\n\n［本文］\n(1) 人に気をつかい、いい人でいようと頑張るぶん、いつも気が張りっぱなし。本音を飲みこんで、笑顔でやり過ごしていませんか？\n(2) それは自律神経の乱れ・胃腸の弱さ・呼吸の浅さ・ため息として出やすく、見た目では肩幅やアンダーがしっかりしがちです。\n(3) 弱いのではなく、“細やかで優しい人”に出るクセです。\n\n［希望］\n気の張りがゆるむと、呼吸が深くなり、肩まわりがすっきり。人に頼れるようになり、印象までやわらかく変わります。\n\n［セルフケア］\n両肩をぎゅーっと耳まで上げて、ストンと落とす。3回くりかえすと、背中の“がんばり”が少し軽くなります。\n\n［わたしが見てきたこと］← ★ここを、なお さんの言葉で\n気をつかう人は、知らないうちに肩と背中で踏ん張っています。呼吸が浅くなりやすいのも、ずっと見てきたこと。\n\n──── 腰=頑固 ────\n［見出し］\nあなたは、がんばりと“頑固さ”が下半身に出る人。\n\n［本文］\n(1) こうと決めたら譲れない・習慣を変えにくい——その芯の強さの裏で、腰や下半身が踏ん張りすぎて固まりやすいタイプ。\n(2) 腰痛・ぎっくり腰、下半身の冷えやむくみ、出やすくありませんか？\n\n［希望］\n腰まわりの力みが抜けて土台が整うと、頑固さが“しなやかな芯”に変わり、冷えや下半身の重さも軽くなります。\n\n［セルフケア］\nイスに浅く腰かけて、上半身をゆっくり前に倒し、腰をだらんと預ける。固まった腰が、じんわりほどけます。\n\n［わたしが見てきたこと］← ★ここを、なお さんの言葉で\n踏ん張る人ほど、腰が固い。下半身が冷えて、めぐらなくなる——何度も出会ってきた形です。\n\n──── 骨盤=本音のフタ ────\n［見出し］\nあなたは、本音にフタをして“女性らしさ”が滞りやすい人。\n\n［本文］\n(1) 本音と建前がずれて、自分の本当の気持ちが分かりにくくなっていませんか？ 我慢した感情は、下半身に溜まりやすいタイプです。\n(2) それは見た目では、下半身太り・ぽっこりお腹・くびれの消失として出やすい。頑張りすぎて、女性らしさが“戦うモード”に傾いている人もいます。\n(3) あなたの女性性は、なくなったのではなく、奥でお休みしているだけです。\n\n［希望］\n本音が流れ出してめぐりが戻ると、肌つや・くびれ・雰囲気までやわらぎます。年齢に関係なく、女性らしさはここから戻ります。\n\n［セルフケア］\nイスに座ったまま、お尻を左右にゆらゆら。骨盤まわりがゆるんで、めぐりが動き出します。\n\n［わたしが見てきたこと］← ★ここを、なお さんの言葉で\n本音を我慢する人は、下半身に溜めこみます。めぐりが止まって、女性らしさが眠ってしまう。\n\n──── 仙骨=感情のためこみ ────\n［見出し］\nあなたは、感情をカラダの奥に溜めこむ人。\n\n［本文］\n(1) 気力がわかない、気分の波が大きい——それは、感情の溜まり場である“奥”が、もういっぱいになっているサインかもしれません。\n(2) ここは、自分ひとりではなかなか気づけない、とても深い場所です。\n\n［希望］\n奥にたまった感情がほどけると、内側からエネルギーが戻り、毎日が軽くなります。——ただ、ここはとても繊細な場所。本当の読み解きは、丁寧に向き合う中でこそ見えてきます。\n\n［セルフケア］\nお尻の上のあたりに手のひらを当てて、あたためる。深呼吸しながら1分。奥にこもった疲れが、ゆるんでいきます。\n\n［わたしが見てきたこと］← ★ここを、なお さんの言葉で\n感情を奥にしまう人は、気力がわきにくい。ここは、いちばん繊細で、ひとりでは気づけない場所。\n\n━━━ 第3部　出し分け（参考・触らなくてOK）━━━\n・一直線＝頭と体が同じタイプ→断定\n・ねじれ＝頭と体がちがう→「頭は○○なのに体は△△」\n・統合＝あちこち同時に高い→全身でつながってる\n・穏やか＝点ほぼ無し→いま整ってる\n";
const t=document.getElementById('t'), saved=document.getElementById('saved'), KEY='karada_edit_v2';
t.value = localStorage.getItem(KEY) || DEFAULT;
let tm; t.addEventListener('input',()=>{ localStorage.setItem(KEY,t.value); clearTimeout(tm); saved.textContent='保存しました'; tm=setTimeout(()=>saved.textContent='',1200); });
document.getElementById('copy').onclick=async()=>{
  try{ await navigator.clipboard.writeText(t.value); }
  catch(e){ t.select(); document.execCommand('copy'); }
  saved.textContent='コピーしました！クロードに貼ってください';
};
document.getElementById('reset').onclick=()=>{ if(confirm('最初の文面に戻します。今の編集は消えます。よろしいですか？')){ t.value=DEFAULT; localStorage.setItem(KEY,DEFAULT); saved.textContent='元に戻しました'; } };
</script>
</body></html>
