<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カラダの声診断 — 編集用</title>
<style>
  :root{--ink:#4a3d42;--muted:#7a6a70;--rose:#e6a6b4;--rosegold:#e3b79e;--champ:#c9a85f;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:radial-gradient(130% 95% at 50% -12%,#fff 0%,#fefafa 52%,#fcf6f1 100%) fixed;color:var(--ink);line-height:1.7;-webkit-text-size-adjust:100%;}
  .wrap{max-width:720px;margin:0 auto;padding:18px 14px 40px;}
  h1{font-family:"Hiragino Mincho ProN",serif;font-size:1.2rem;color:#b88a32;letter-spacing:.08em;margin:6px 0 2px;text-align:center;font-weight:500;}
  .lead{color:var(--muted);font-size:.82rem;text-align:center;margin:0 0 14px;}
  .note{background:#fff;border:1px solid rgba(190,150,140,.25);border-radius:12px;padding:12px 14px;font-size:.82rem;color:var(--muted);margin-bottom:12px;line-height:1.75;}
  textarea{width:100%;min-height:64vh;border:1.5px solid rgba(190,150,140,.35);border-radius:14px;padding:14px;font-size:15px;line-height:1.85;font-family:-apple-system,"Hiragino Sans",sans-serif;color:var(--ink);background:#fff;resize:vertical;-webkit-appearance:none;}
  textarea:focus{outline:none;border-color:var(--champ);}
  .bar{position:sticky;bottom:0;display:flex;gap:9px;padding:12px 0 4px;background:linear-gradient(180deg,rgba(255,255,255,0),#fcf6f1 40%,#fcf6f1);}
  button{flex:1;border:none;border-radius:13px;padding:16px;font-size:1.05rem;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--rose),var(--rosegold));box-shadow:0 8px 18px rgba(220,160,170,.3);letter-spacing:.04em;cursor:pointer;font-family:inherit;}
  button.sub{flex:0 0 auto;background:#fff;color:var(--muted);border:1px solid #ddd;box-shadow:none;font-weight:600;font-size:.9rem;padding:16px 14px;}
  .saved{text-align:center;font-size:.8rem;color:var(--champ);min-height:1.3em;margin-top:8px;letter-spacing:.04em;font-weight:700;}
</style></head>
<body><div class="wrap">
  <h1>カラダの声診断 ｜ 編集用</h1>
  <p class="lead">下の文を、自由に書き直してください（v4・言い当て＋複合）</p>
  <div class="note">第2部＝5タイプの言い当て／第3部＝複合型のつなぎ。打つと自動保存。直したら「全部コピー」でクロードに貼ってください。</div>
  <textarea id="t" spellcheck="false"></textarea>
  <div class="saved" id="saved"></div>
  <div class="bar"><button class="sub" id="reset">最初に戻す</button><button id="copy">全部コピー</button></div>
</div>
<script>
const DEFAULT = "カラダの声診断 ｜ 編集用シート v4（言い当て＋複合つなぎ）\n\n【ルール】タイプ【　】はそのまま／文だけ直す。からだ＝カタカナ「カラダ」。年数・人数は入れない。無意識を当てる（オウム返しにしない）。\n\n━━━ 第1部　質問（全12問・各4択）━━━\n\n──── 第1章　思考と心のクセ ────\n\nQ1. つい、やってしまうクセは？\n　【首】あれこれ考えすぎて、なかなか動き出せない\n　【背中】まわりに気をつかい、いい人でいる\n　【腰】こうと決めたら、ゆずれない\n　【骨盤】本音を飲みこんで、笑顔でやり過ごす\n\nQ2. ストレスがかかると、どうなりがち？\n　【首】頭がぐるぐるして、休まらない\n　【背中】人の評価や顔色が、気になってしまう\n　【仙骨】気力がしぼんで、動けなくなる\n　【整】わりと切り替えられる\n\nQ3. 感情について、近いのは？\n　【骨盤】本当の気持ちにフタをして、我慢しがち\n　【仙骨】感情を、あまり感じないようにしている\n　【骨盤＋仙骨】モヤモヤやイライラが、急にあふれる\n　【整】わりと素直に出せている\n\nQ4. 頼ること・甘えることは？\n　【背中】頼るのが苦手で、ひとりで抱えこむ\n　【首】スマホや甘いものに、つい頼ってしまう\n　【仙骨】もう、誰かに任せてしまいたい\n　【整】人に、ちゃんと頼れている\n\n──── 第2章　気になる見た目 ────\n\nQ5. 鏡を見て、いちばん気になるのは？\n　【首】顔のたるみ・くすみ・目元のクマ\n　【骨盤】下半身太り・ぽっこりお腹\n　【背中】肩幅・二の腕・背中の厚み\n　【整】いまは、とくに気にならない\n\nQ6. 体型の変化で気になるのは…\n　【骨盤】くびれが、ゆるくなってきた\n　【腰＋骨盤】脚やお尻が、どっしりしてきた\n　【背中】上半身が、がっしりしてきた\n　【整】とくに変化は感じない\n\nQ7. めぐり（むくみ・冷え）は？\n　【首＋骨盤】顔やまぶたが、むくみやすい\n　【腰＋骨盤】下半身がむくむ・冷える\n　【骨盤＋腰】手足が、いつも冷たい\n　【整】あまり気にならない\n\nQ8. 肌・髪・顔色のツヤは？\n　【骨盤】つや・うるおいが、減ってきた\n　【首】顔色がさえない・くすむ\n　【仙骨】なんとなく、生気がない感じ\n　【整】わりと元気に見える方\n\n──── 第3章　カラダの不調・サイン ────\n\nQ9. 出やすい不調は？\n　【首】肩こり・頭痛・目の疲れ\n　【背中】胃腸の弱さ・自律神経の乱れ\n　【腰】腰痛・ぎっくり腰\n　【整】とくに、不調はない\n\nQ10. 眠りと、朝の感じは？\n　【首】考えごとで、寝つきが悪い\n　【背中】眠りが浅い・ため息が多い\n　【仙骨】朝がいちばんつらい・起きられない\n　【整】わりと、よく眠れている\n\nQ11. 生理・ホルモンの波は？\n　【骨盤】生理前のゆらぎ（PMS・むくみ・気分）\n　【腰＋骨盤】生理痛・下半身の冷えがつらい\n　【仙骨】疲れると、すぐ乱れる\n　【整】わりと安定している方\n\nQ12. 自分のカラダのこと、正直…\n　【気づけてない】よく分からない・見て見ぬふり\n　【気づけてない】不調があるのが、当たり前になっている\n　【気づけてない】気になるけど、何をすればいいか分からない\n　【整】わりと分かっているほう\n\n\n━━━ 第2部　結果文＝言い当て（5タイプ）━━━\n\n──── 首＝考えすぎ ────\n答えの出ないことを、ずっと考え続けていませんか？\nもう終わったこと、まだ起きてないこと。気づかないうちに、頭がずっと回っています。\nだから、首がカチカチ。目も、疲れやすい。\nでも、あなたは考えすぎなんじゃありません。ひらめきが、冴える人。\n首がゆるむと、目が澄んで、それが戻ってきます。\n\n──── 背中＝気づかい ────\n無意識に、相手の顔色を伺っていませんか？\n気づかないうちに、いつも誰かに合わせている。\nだから、気が休まらない。背中と肩が、ずっと見張りに立っています。\nでも、そんなに気を張らなくて、いいんです。\n少し肩の力を抜くと、もっとラクになります。\n\n──── 腰＝頑固 ────\n「こうあるべき」で、無意識に自分を動かしていませんか？\n「ちゃんとしなきゃ」「ここで頑張らなきゃ」。気づかないうちに、ずっと自分に力が入っています。\nだから、腰が休まらない。ずっと踏ん張っているから。\nそんなに頑張らなくても、大丈夫。\nゆるめたほうが、うまくいくから。\n\n──── 骨盤＝本音のフタ ────\n無意識に、人と比べていませんか？\nいつのまにか、自分らしさが消えている。\nでも、あなたの心が狭いからじゃない。\n本音にフタをして、行き場がなくなっているだけ。\n本来のあなたは、もっとふんわりしています。\nゆるんだら、自分が戻ってくる。\n\n──── 仙骨＝感情のためこみ ────\n無意識に、イライラを飲み込んでいませんか？\n息が浅い。呼吸が、止まっている。カラダも、ずっと緊張したまま。\nそうやってためこんで、なんだか元気が出ない。\nあなたが弱いんじゃありません。ためこみすぎただけ。\n少しずつ出していけば、大丈夫。\n吐き出すほど、軽くなるから。\n\n\n━━━ 第3部　複合型のつなぎ言葉（自由に書き換え）━━━\n※2つ以上のタイプが重なった人に出す\"つなぎ\"。①〜④。\n\n【①ひとこと版】（ねじれで2つ並べるとき用）\n　首：答えの出ないことを、考え続けている\n　背中：人の顔色を、うかがっている\n　腰：「こうあるべき」で、踏ん張っている\n　骨盤：人と比べて、本音にフタをしている\n　仙骨：イライラを飲み込んで、ためこんでいる\n\n【②ねじれ】頭とカラダがちがう人（例：頭＝首／カラダ＝骨盤）\nあなたは、頭とカラダが、ちがう場所で頑張っています。\n頭は——答えの出ないことを、考え続けている。\nでもカラダは——人と比べて、本音にフタをしている。\n頭で対処しても、根っこは別の場所に残ったまま。\nまず、そこに気づくこと。\n\n【③2つ重なる】一番強いタイプ＋2番目を添える\n（一番強い言い当てのあとに）\nそして、あなたには〈○○〉も重なっています。\nひとつじゃ、おさまらない。それが、あなたです。\n\n【④統合】ぜんぶ高い人\nあなたは、一カ所じゃありません。\nカラダのあちこちが、同時に声をあげています。\n不調が多い、ってことじゃない。\n心とカラダが、ぜんぶつながっている人。\n";
const t=document.getElementById('t'), saved=document.getElementById('saved'), KEY='karada_edit_v4';
t.value = localStorage.getItem(KEY) || DEFAULT;
let tm; t.addEventListener('input',()=>{ localStorage.setItem(KEY,t.value); clearTimeout(tm); saved.textContent='保存しました'; tm=setTimeout(()=>saved.textContent='',1200); });
document.getElementById('copy').onclick=async()=>{ try{ await navigator.clipboard.writeText(t.value); }catch(e){ t.select(); document.execCommand('copy'); } saved.textContent='コピーしました！クロードに貼ってください'; };
document.getElementById('reset').onclick=()=>{ if(confirm('最初の文面に戻します。今の編集は消えます。よろしいですか？')){ t.value=DEFAULT; localStorage.setItem(KEY,DEFAULT); saved.textContent='元に戻しました'; } };
</script>
</body></html>
