<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カラダの声診断 — 編集用</title>
<style>
  :root{--ink:#4a3d42;--muted:#7a6a70;--rose:#e6a6b4;--rosegold:#e3b79e;--champ:#c9a85f;--panel:#fff;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:radial-gradient(130% 95% at 50% -12%,#fff 0%,#fefafa 52%,#fcf6f1 100%) fixed;color:var(--ink);
    line-height:1.7;-webkit-text-size-adjust:100%;}
  .wrap{max-width:720px;margin:0 auto;padding:18px 14px 40px;}
  h1{font-family:"Hiragino Mincho ProN",serif;font-size:1.2rem;color:#b88a32;letter-spacing:.08em;margin:6px 0 2px;text-align:center;font-weight:500;}
  .lead{color:var(--muted);font-size:.82rem;text-align:center;margin:0 0 14px;}
  .note{background:#fff;border:1px solid rgba(190,150,140,.25);border-radius:12px;padding:12px 14px;font-size:.82rem;color:var(--muted);margin-bottom:12px;line-height:1.75;}
  textarea{width:100%;min-height:62vh;border:1.5px solid rgba(190,150,140,.35);border-radius:14px;
    padding:14px;font-size:15px;line-height:1.8;font-family:-apple-system,"Hiragino Sans",monospace;
    color:var(--ink);background:#fff;resize:vertical;-webkit-appearance:none;}
  textarea:focus{outline:none;border-color:var(--champ);}
  .bar{position:sticky;bottom:0;display:flex;gap:9px;padding:12px 0 4px;
    background:linear-gradient(180deg,rgba(255,255,255,0),#fcf6f1 40%,#fcf6f1);}
  button{flex:1;border:none;border-radius:13px;padding:15px;font-size:1rem;font-weight:700;color:#fff;
    background:linear-gradient(135deg,var(--rose),var(--rosegold));box-shadow:0 8px 18px rgba(220,160,170,.3);
    letter-spacing:.04em;cursor:pointer;font-family:inherit;}
  button.sub{flex:0 0 auto;background:#fff;color:var(--muted);border:1px solid #ddd;box-shadow:none;font-weight:600;}
  .saved{text-align:center;font-size:.76rem;color:var(--champ);min-height:1.2em;margin-top:8px;letter-spacing:.04em;}
</style></head>
<body><div class="wrap">
  <h1>カラダの声診断 ｜ 編集用</h1>
  <p class="lead">下の文を、自由に書き直してください</p>
  <div class="note">
    ・直したいところを、そのまま打ち直すだけ。<br>
    ・行アタマの【首】【骨盤】…は「裏のタイプ」。文だけ直すのが基本（タイプを変えたいときは中身を 首/背中/腰/骨盤/仙骨/整/気づけてない に書き換え）。<br>
    ・打った内容は<strong>自動でこの端末に保存</strong>されます（消えません）。<br>
    ・直し終わったら、下の<strong>「全部コピー」</strong>を押して、ナオさんからクロードに貼って渡してください。
  </div>
  <textarea id="t" spellcheck="false"></textarea>
  <div class="saved" id="saved"></div>
  <div class="bar">
    <button class="sub" id="reset">最初に戻す</button>
    <button id="copy">全部コピー</button>
  </div>
</div>
<script>
const DEFAULT = "＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n  カラダの声診断 ｜ 編集用シート（自由に書き換えてOK）\n＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n\n【直し方のルール】\n・各行アタマの【　】＝裏のタイプです。その右の文を、自由に書き換えてください。\n・「この選択肢、タイプが違う」と思ったら、【　】の中身を下の7つのどれかに書き換えてOK。\n・タイプ7種：　首 ／ 背中 ／ 腰 ／ 骨盤 ／ 仙骨 ／ 整 ／ 気づけてない\n    （首=考えすぎ・背中=気づかい・腰=頑固・骨盤=本音のフタ・仙骨=感情のためこみ）\n    （整=その人は整っている・気づけてない=自覚が薄い）\n・【骨盤＋仙骨】のように＋でつなぐと「メインのタイプ＋少しだけ別タイプ」になります。\n・質問文（Q.の行）も書き換えOK。選択肢を増やす/減らすのは、そこにメモ書きしてくれれば対応します。\n・書き終わったら、このシートを丸ごと私に渡してください（貼り付け or 保存）。アプリに入れます。\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  第1部　質問（全12問・各4択）\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n──────────  第1章　思考と心のクセ  ──────────\n\nQ1. つい、やってしまうクセは？\n   【首】あれこれ考えすぎて、なかなか動き出せない\n   【背中】まわりに気をつかい、いい人でいる\n   【腰】こうと決めたら、ゆずれない\n   【骨盤】本音を飲みこんで、笑顔でやり過ごす\n\nQ2. ストレスがかかると、どうなりがち？\n   【首】頭がぐるぐるして、休まらない\n   【背中】人の評価や顔色が、気になってしまう\n   【仙骨】気力がしぼんで、動けなくなる\n   【整】わりと切り替えられる\n\nQ3. 感情について、近いのは？\n   【骨盤】本当の気持ちにフタをして、我慢しがち\n   【仙骨】感情を、あまり感じないようにしている\n   【骨盤＋仙骨】モヤモヤやイライラが、急にあふれる\n   【整】わりと素直に出せている\n\nQ4. 頼ること・甘えることは？\n   【背中】頼るのが苦手で、ひとりで抱えこむ\n   【首】スマホや甘いものに、つい頼ってしまう\n   【仙骨】もう、誰かに任せてしまいたい\n   【整】人に、ちゃんと頼れている\n\n──────────  第2章　気になる見た目  ──────────\n\nQ5. 鏡を見て、いちばん気になるのは？\n   【首】顔のたるみ・くすみ・目元のクマ\n   【骨盤】下半身太り・ぽっこりお腹\n   【背中】肩幅・二の腕・背中の厚み\n   【整】いまは、とくに気にならない\n\nQ6. 体型の変化で気になるのは…\n   【骨盤】くびれが、ゆるくなってきた\n   【腰＋骨盤】脚やお尻が、どっしりしてきた\n   【背中】上半身が、がっしりしてきた\n   【整】とくに変化は感じない\n\nQ7. めぐり（むくみ・冷え）は？\n   【首＋骨盤】顔やまぶたが、むくみやすい\n   【腰＋骨盤】下半身がむくむ・冷える\n   【骨盤＋腰】手足が、いつも冷たい\n   【整】あまり気にならない\n\nQ8. 肌・髪・顔色のツヤは？\n   【骨盤】つや・うるおいが、減ってきた\n   【首】顔色がさえない・くすむ\n   【仙骨】なんとなく、生気がない感じ\n   【整】わりと元気に見える方\n\n──────────  第3章　カラダの不調・サイン  ──────────\n\nQ9. 出やすい不調は？\n   【首】肩こり・頭痛・目の疲れ\n   【背中】胃腸の弱さ・自律神経の乱れ\n   【腰】腰痛・ぎっくり腰\n   【整】とくに、不調はない\n\nQ10. 眠りと、朝の感じは？\n   【首】考えごとで、寝つきが悪い\n   【背中】眠りが浅い・ため息が多い\n   【仙骨】朝がいちばんつらい・起きられない\n   【整】わりと、よく眠れている\n\nQ11. 生理・ホルモンの波は？\n   【骨盤】生理前のゆらぎ（PMS・むくみ・気分）\n   【腰＋骨盤】生理痛・下半身の冷えがつらい\n   【仙骨】疲れると、すぐ乱れる\n   【整】わりと安定している方\n\nQ12. 自分のカラダのこと、正直…\n   【気づけてない】よく分からない・見て見ぬふり\n   【気づけてない】不調があるのが、当たり前になっている\n   【気づけてない】気になるけど、何をすればいいか分からない\n   【整】わりと分かっているほう\n\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  第2部　結果文（5タイプ・自由に書き換え）\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n※ 各タイプに「見出し→本文→希望→セルフケア→科学」の5つ。文章をそのまま直してください。\n\n──────────  首=考えすぎ  ──────────\n［見出し］\nあなたは、考えすぎが“見た目と不調”に出る人。\n\n［本文］\n(1) 頭がいつも動いていて、ぐるぐる思考が止まりにくいタイプ。気づくと、スマホや甘いものに頼りたくなりませんか？\n(2) その緊張は、肩こり・頭痛・目の疲れになり、さらに——顔のたるみ・くすみ・目元のクマとして“見た目”にあらわれます。\n(3) たるみも目元のクマも、年齢だけのせいではありません。「考えすぎ」のクセが、そのまま出ているサインです。\n\n［希望］\n思考の緊張がゆるむと、顔まわりが引き上がり、目元も軽くなります。頭で頑張ってきた人ほど、ここが解けると見た目が変わります。\n\n［セルフケア］\n考えすぎに気づいたら、いったん目を閉じて、口から長〜く息を吐いてみて。それだけで、首と頭の力がふっとゆるみます。\n\n［科学のうらづけ］\n※ 首には、自律神経（迷走神経）や顔のリンパが集まります。考えすぎの緊張が、肩こり・むくみ・たるみとして出やすいことには、神経科学的にも理由があります。\n\n──────────  背中=気づかい  ──────────\n［見出し］\nあなたは、気づかいを“カラダ”に溜めこむ人。\n\n［本文］\n(1) 人に気をつかい、いい人でいようと頑張るぶん、いつも気が張りっぱなし。本音を飲みこんで、笑顔でやり過ごしていませんか？\n(2) それは自律神経の乱れ・胃腸の弱さ・呼吸の浅さ・ため息として出やすく、見た目では肩幅やアンダーがしっかりしがちです。\n(3) 弱いのではなく、“細やかで優しい人”に出るクセです。\n\n［希望］\n気の張りがゆるむと、呼吸が深くなり、肩まわりがすっきり。人に頼れるようになり、印象までやわらかく変わります。\n\n［セルフケア］\n両肩をぎゅーっと耳まで上げて、ストンと落とす。3回くりかえすと、背中の“がんばり”が少し軽くなります。\n\n［科学のうらづけ］\n※ 背中（胸椎）は、交感神経が集まる場所。胃腸や呼吸ともつながっているため、気の張りが内臓や呼吸の浅さに出やすいと考えられています。\n\n──────────  腰=頑固  ──────────\n［見出し］\nあなたは、がんばりと“頑固さ”が下半身に出る人。\n\n［本文］\n(1) こうと決めたら譲れない・習慣を変えにくい——その芯の強さの裏で、腰や下半身が踏ん張りすぎて固まりやすいタイプ。\n(2) 腰痛・ぎっくり腰、下半身の冷えやむくみ、出やすくありませんか？\n\n［希望］\n腰まわりの力みが抜けて土台が整うと、頑固さが“しなやかな芯”に変わり、冷えや下半身の重さも軽くなります。\n\n［セルフケア］\nイスに浅く腰かけて、上半身をゆっくり前に倒し、腰をだらんと預ける。固まった腰が、じんわりほどけます。\n\n［科学のうらづけ］\n※ 腰は、下半身のめぐりの要。踏ん張りすぎて固まると、冷えやむくみとしてあらわれやすくなります。\n\n──────────  骨盤=本音のフタ  ──────────\n［見出し］\nあなたは、本音にフタをして“女性らしさ”が滞りやすい人。\n\n［本文］\n(1) 本音と建前がずれて、自分の本当の気持ちが分かりにくくなっていませんか？ 我慢した感情は、下半身に溜まりやすいタイプです。\n(2) それは見た目では、下半身太り・ぽっこりお腹・くびれの消失として出やすい。頑張りすぎて、女性らしさが“戦うモード”に傾いている人もいます。\n(3) あなたの女性性は、なくなったのではなく、奥でお休みしているだけです。\n\n［希望］\n本音が流れ出してめぐりが戻ると、肌つや・くびれ・雰囲気までやわらぎます。年齢に関係なく、女性らしさはここから戻ります。\n\n［セルフケア］\nイスに座ったまま、お尻を左右にゆらゆら。骨盤まわりがゆるんで、めぐりが動き出します。\n\n［科学のうらづけ］\n※ 骨盤は、女性ホルモンと、抑えた感情がたまりやすい場所。我慢が、めぐりや下半身のかたちに出やすいことが知られています。\n\n──────────  仙骨=感情のためこみ  ──────────\n［見出し］\nあなたは、感情をカラダの奥に溜めこむ人。\n\n［本文］\n(1) 気力がわかない、気分の波が大きい——それは、感情の溜まり場である“奥”が、もういっぱいになっているサインかもしれません。\n(2) ここは、自分ひとりではなかなか気づけない、とても深い場所です。\n\n［希望］\n奥にたまった感情がほどけると、内側からエネルギーが戻り、毎日が軽くなります。——ただ、ここはとても繊細な場所。本当の読み解きは、丁寧に向き合う中でこそ見えてきます。\n\n［セルフケア］\nお尻の上のあたりに手のひらを当てて、あたためる。深呼吸しながら1分。奥にこもった疲れが、ゆるんでいきます。\n\n［科学のうらづけ］\n※ 仙骨は、休息と回復をつかさどる副交感神経の出口。ここに疲れがたまると、気力が湧きにくくなると考えられています。\n\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  第3部　結果の出し分け（参考・触らなくてOK）\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n・一直線 ＝ 頭(考え方)と体(見た目+不調)が同じタイプ → そのタイプを言い当て\n・ねじれ ＝ 頭と体がちがうタイプ → 「頭は○○なのに、体は△△」と見抜く\n・統合　 ＝ いろんな所が同時に高い → 全身でつながっている\n・穏やか ＝ ほとんど点がない → いま整っている\n";
const t=document.getElementById('t'), saved=document.getElementById('saved'), KEY='karada_edit_v1';
t.value = localStorage.getItem(KEY) || DEFAULT;
let tm; t.addEventListener('input',()=>{ localStorage.setItem(KEY,t.value); clearTimeout(tm); saved.textContent='保存しました'; tm=setTimeout(()=>saved.textContent='',1200); });
document.getElementById('copy').onclick=async()=>{
  try{ await navigator.clipboard.writeText(t.value); }
  catch(e){ t.select(); document.execCommand('copy'); }
  saved.textContent='コピーしました！クロードに貼ってください';
};
document.getElementById('reset').onclick=()=>{ if(confirm('最初の文面に戻します。今の編集は消えます。よろしいですか？')){ t.value=DEFAULT; localStorage.setItem(KEY,DEFAULT); saved.textContent='元に戻しました'; } };
</script>
</body></html>
